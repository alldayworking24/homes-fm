<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOMES FM - 룸체크</title>
<style>
:root{--navy:#000522;--yellow:#ffc400;--line:#e5e7eb;--text:#0f172a;--muted:#64748b;--ok:#0f8a5f;--warn:#b45309;--bad:#b91c1c}
*{box-sizing:border-box}body{margin:0;background:#fff;color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;letter-spacing:-.03em}
button,input,select,textarea{font-family:inherit}.app{max-width:520px;margin:0 auto;min-height:100vh;background:#fff}.top{height:56px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:20}.brand{font-size:21px;font-weight:900}.hamb{border:0;background:transparent;color:#fff;font-size:28px;font-weight:900}
.page{padding:18px 16px 86px}.hide{display:none!important}.title{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}.title h1{font-size:26px;margin:0 0 6px;color:var(--navy);font-weight:900}.title p{font-size:14px;margin:0;color:#4b5563}.help{width:52px;height:52px;border:1.5px solid var(--navy);border-radius:999px;background:#fff;color:var(--navy);font-size:28px;font-weight:900}
.card{border:1px solid var(--line);border-radius:18px;background:#fff;margin-bottom:16px;overflow:hidden}.body{padding:16px}.head{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--line);background:#fafafb}.headL{display:flex;align-items:center;gap:10px}.num{width:36px;height:36px;border-radius:11px;background:var(--yellow);display:grid;place-items:center;font-weight:900}.head h2{margin:0;color:var(--navy);font-size:20px;font-weight:900}.btn{border:0;border-radius:12px;background:var(--navy);color:#fff;padding:12px 14px;font-size:15px;font-weight:900}.btn.y{background:var(--yellow);color:#111}.btn.s{background:#fff;color:var(--navy);border:1px solid var(--navy)}
label{display:block;font-size:13px;color:#374151;font-weight:900;margin:0 0 7px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;padding:13px;font-size:15px}textarea{min-height:88px}
.typeGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.typeBtn{height:76px;border:1px solid var(--line);background:#fff;border-radius:13px;font-size:13px;font-weight:900}.typeBtn svg{display:block;margin:0 auto 5px;width:23px;height:23px}.typeBtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}.typeBtn.active svg{stroke:#fff}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.targetBox{border:2px dashed #ef4444;border-radius:14px;padding:14px;margin-top:14px}.targetTitle{font-size:16px;font-weight:900;margin-bottom:12px}.targetGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.hint{font-size:12px;color:#64748b;margin-top:10px}.cat{border:1px solid var(--line);border-radius:15px;overflow:hidden;margin-bottom:12px}.catHead{width:100%;border:0;background:#f1f3f6;color:var(--navy);font-weight:900;padding:14px;display:flex;justify-content:space-between}.item{border-top:1px solid var(--line);padding:14px}.itemName{font-size:16px;font-weight:900}.sub{font-size:13px;color:var(--muted);margin-top:3px}.status{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}.status button{border:1px solid var(--line);background:#fff;border-radius:11px;padding:10px 2px;font-size:12px;font-weight:900}.status .on.good{background:#ecfdf5;color:var(--ok)}.status .on.warn{background:#fffbeb;color:var(--warn)}.status .on.bad{background:#fef2f2;color:var(--bad)}.status .on.na{background:#f3f4f6}.detail{margin-top:10px;border:1px solid var(--line);border-radius:13px;background:#fafafb;padding:12px}.photo{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.photo label{position:relative;overflow:hidden;border:2px solid var(--navy);border-radius:11px;padding:11px;text-align:center;font-weight:900;color:var(--navy);font-size:13px}.photo label:first-child{background:var(--navy);color:#fff}.photo input{position:absolute;inset:0;opacity:0}.list{border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:10px}.listTop{display:flex;justify-content:space-between;gap:10px}.list b{font-size:16px;color:var(--navy)}.meta{font-size:13px;color:var(--muted);margin-top:4px}.badge{border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;white-space:nowrap;background:#fff7ed;color:var(--warn)}.actions{display:flex;gap:8px;margin-top:12px}.act{border:1px solid var(--line);background:#fff;border-radius:11px;width:42px;height:40px;font-size:17px}.bottom{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);height:70px;z-index:30}.bottom button{border:0;background:#fff;color:#334155;font-size:11px;font-weight:900}.bottom svg{display:block;margin:0 auto 3px;width:22px;height:22px}.cam{width:62px;height:62px;border-radius:999px;background:var(--navy);color:#fff;display:grid;place-items:center;margin:-24px auto 0}.cam svg{stroke:#fff;width:30px;height:30px}.empty{border:1px dashed #cbd5e1;border-radius:13px;background:#f8fafc;color:#64748b;padding:18px;text-align:center;font-weight:900}.saveBar{position:sticky;bottom:70px;z-index:25;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 -16px -16px}.saveBar .btn{min-height:46px}
@media(max-width:420px){.targetGrid{grid-template-columns:1fr}.typeGrid{grid-template-columns:repeat(2,1fr)}.row2{grid-template-columns:1fr}.title h1{font-size:24px}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand">⌂ HOMES</div><button class="hamb" onclick="show('list')">☰</button></header>

<section id="list" class="page">
  <div class="title"><div><h1>룸 체크 리스트</h1><p>목록에서 등록·수정·보수·완료 상태를 관리합니다.</p></div><button class="help">?</button></div>
  <div class="card"><div class="body">
    <div class="row2"><select><option>전체 지점</option><option>선정릉</option><option>남영</option><option>안암</option></select><select><option>전체 상태</option><option>룸체크</option><option>보수 진행</option><option>정비 완료</option></select></div>
    <input style="margin-top:10px" placeholder="지점, 호실, 점검자 검색">
    <div id="listWrap" style="margin-top:14px"></div>
  </div></div>
</section>

<section id="form" class="page hide">
  <div class="title"><div><h1>룸 체크 리스트</h1><p>지점 / 층 / 호실을 선택하여 점검을 시작하세요.</p></div><button class="help">?</button></div>
  <div class="card"><div class="head"><div class="headL"><span class="num">1</span><h2>점검 기본정보</h2></div><button class="btn s" onclick="show('list')">☷ 목록</button></div>
    <div class="body">
      <label>점검 분류</label>
      <div class="typeGrid">
        <button class="typeBtn active" onclick="pickType(this)">입실 전</button>
        <button class="typeBtn" onclick="pickType(this)">퇴실</button>
        <button class="typeBtn" onclick="pickType(this)">CS 요청</button>
        <button class="typeBtn" onclick="pickType(this)">정기</button>
      </div>
      <div class="targetBox">
        <div class="targetTitle">지점 / 층 / 호실 선택 (필수)</div>
        <div class="targetGrid">
          <div><label>지점</label><select id="branch" onchange="setBranch()"></select></div>
          <div><label>층</label><select id="floor" onchange="setFloor()"></select></div>
          <div><label>호실</label><select id="unit"></select></div>
        </div>
        <div class="hint">※ 지점을 선택하면 해당 지점의 층/호실이 자동으로 표시됩니다.</div>
      </div>
      <div style="margin-top:14px"><label>점검자</label><input value="로그인 사용자" readonly></div>
      <div style="margin-top:12px"><label>점검일</label><input type="date" id="today"></div>
    </div>
  </div>
  <div class="card"><div class="head"><div class="headL"><span class="num">2</span><h2>체크 항목</h2></div></div><div class="body" id="checklist"></div></div>
  <div class="saveBar"><button class="btn s" onclick="saveDraft()">임시저장</button><button class="btn y" onclick="saveCheck()">신규 룸체크 저장</button></div>
</section>

<nav class="bottom">
 <button onclick="show('list')">홈</button><button onclick="show('list')">룸체크</button><button onclick="show('form')"><div class="cam">＋</div></button><button>보수관리</button><button>더보기</button>
</nav>
</div>
<script>
const DATA={선정릉:{s:3,e:12,c:6},남영:{s:5,e:12,c:8},안암:{s:3,e:8,c:10},아코모가산:{s:3,e:10,c:8},아코모회기:{s:3,e:10,c:8}};
const items=[['입구',[['현관문','여닫이 상태'],['조명','점등 상태'],['신발장','여닫이/훼손']]],['주방',[['싱크대','막힘/누수'],['후드','작동 여부'],['냉장고','작동 여부']]],['화장실',[['세면기','누수/파손'],['샤워기','작동 여부'],['변기','막힘 여부']]]];
function show(id){document.querySelectorAll('section.page').forEach(x=>x.classList.add('hide'));document.getElementById(id).classList.remove('hide');scrollTo(0,0)}
function pickType(b){document.querySelectorAll('.typeBtn').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function setBranch(){
  const selected=branch.value;
  floor.innerHTML='<option value="">선택하세요</option>';
  unit.innerHTML='<option value="">선택하세요</option>';
  floor.disabled=!selected;
  unit.disabled=true;
  if(!selected) return;
  const d=DATA[selected];
  for(let f=d.s;f<=d.e;f++) floor.innerHTML+=`<option value="${f}">${f}층</option>`;
}
function setFloor(){
  const selectedBranch=branch.value, selectedFloor=floor.value;
  unit.innerHTML='<option value="">선택하세요</option>';
  unit.disabled=!selectedFloor;
  if(!selectedBranch||!selectedFloor) return;
  const d=DATA[selectedBranch];
  let max=d.c;
  if(selectedBranch==='남영'&&selectedFloor==='12') max=7;
  for(let i=1;i<=max;i++){
    const u=String(selectedFloor)+String(i).padStart(2,'0');
    if(selectedBranch==='남영'&&u==='1205') continue;
    unit.innerHTML+=`<option value="${u}">${u}호</option>`;
  }
}
function setStatus(btn,s){let it=btn.closest('.item');it.dataset.status=s;it.querySelectorAll('.status button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');it.querySelector('.detail').classList.toggle('hide',s==='na')}
function collectCheck(){
  return [...document.querySelectorAll('.item')].map(item=>({
    category:item.closest('.cat').querySelector('.catHead span').textContent,
    name:item.querySelector('.itemName').textContent,
    status:item.dataset.status||'',
    memo:item.querySelector('textarea')?.value||''
  }));
}
function saveDraft(){
  const data=collectCheck();
  localStorage.setItem('homesFmDraft',JSON.stringify({
    branch:branch.value,floor:floor.value,unit:unit.value,date:today.value,items:data
  }));
  alert('임시저장되었습니다.');
}
function saveCheck(){
  if(!branch.value||!floor.value||!unit.value){
    alert('지점, 층, 호실을 모두 선택하세요.');
    return;
  }
  const data=collectCheck();
  const missing=data.filter(x=>!x.status);
  if(missing.length){
    alert('미점검 항목이 '+missing.length+'개 있습니다. 모든 항목을 선택하세요.');
    return;
  }
  const saved=JSON.parse(localStorage.getItem('homesFmChecks')||'[]');
  saved.unshift({
    id:Date.now(),
    branch:branch.value,
    floor:floor.value,
    unit:unit.value,
    date:today.value,
    inspector:'로그인 사용자',
    items:data
  });
  localStorage.setItem('homesFmChecks',JSON.stringify(saved));
  alert('신규 룸체크가 저장되었습니다.');
  show('list');
}
function render(){today.value=new Date().toISOString().slice(0,10);branch.innerHTML='<option value="">선택하세요</option>'+Object.keys(DATA).map(x=>`<option value="${x}">${x}</option>`).join('');floor.innerHTML='<option value="">선택하세요</option>';unit.innerHTML='<option value="">선택하세요</option>';floor.disabled=true;unit.disabled=true;listWrap.innerHTML='<div class="list"><div class="listTop"><div><b>선정릉 301호</b><div class="meta">입실 전 · 2026-07-09 · 로그인 사용자</div></div><span class="badge">룸체크</span></div><div class="actions"><button class="act" onclick="show(\'form\')">✎</button><button class="act">🔧</button></div></div>';checklist.innerHTML=items.map(c=>`<div class="cat"><button class="catHead" onclick="this.nextElementSibling.classList.toggle('hide')"><span>${c[0]}</span><span>${c[1].length}개 항목⌄</span></button><div>${c[1].map(i=>`<div class="item" data-status=""><div class="itemName">${i[0]}</div><div class="sub">${i[1]}</div><div class="status"><button class="good" onclick="setStatus(this,'good')">양호</button><button class="warn" onclick="setStatus(this,'warn')">보통</button><button class="bad" onclick="setStatus(this,'bad')">불량</button><button class="na" onclick="setStatus(this,'na')">해당없음</button></div><div class="detail hide"><textarea placeholder="상세내용(특이사항)"></textarea><div class="photo"><label>사진찍기<input type="file" accept="image/*" capture="environment" multiple></label><label>갤러리<input type="file" accept="image/*" multiple></label></div></div></div>`).join('')}</div></div>`).join('')}
render();
</script>
</body>
</html>
